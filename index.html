<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>零用金記帳 · 泥研製所</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Noto+Serif+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea; --bg-card: #fbf9f4; --ink: #1a1a1a;
    --ink-soft: #5a5a5a; --ink-faded: #8a8a8a;
    --line: #d9d3c5; --line-soft: #e8e2d4;
    --accent: #8b2c2c; --accent-soft: #c4a574;
    --green: #3d5a2c; --red: #8b2c2c; --live: #2d7a4f;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif TC', serif; background: var(--bg); color: var(--ink);
    line-height: 1.6; min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(196, 165, 116, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(139, 44, 44, 0.05) 0%, transparent 50%);
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
  header {
    text-align: center; padding: 24px 0 40px;
    border-bottom: 1px solid var(--line); margin-bottom: 40px; position: relative;
  }
  header::before {
    content: "零用金"; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    font-family: 'Fraunces', serif; font-size: 11px; letter-spacing: 0.3em;
    color: var(--ink-faded); text-transform: uppercase;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 400;
    font-size: clamp(36px, 5vw, 52px); letter-spacing: -0.02em; margin-top: 18px;
  }
  h1 .zh { font-family: 'Noto Serif TC', serif; font-weight: 500; margin-left: 12px; }
  .subtitle { margin-top: 10px; font-size: 13px; color: var(--ink-soft); font-style: italic; }
  .balance-bar {
    background: var(--ink); color: var(--bg-card); border-radius: 2px;
    padding: 20px 28px; margin-bottom: 36px; display: flex;
    justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
    box-shadow: var(--shadow);
  }
  .balance-bar .item { display: flex; flex-direction: column; }
  .balance-bar .label {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--accent-soft); font-family: 'Fraunces', serif;
  }
  .balance-bar .value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; margin-top: 4px; }
  .balance-bar .value.total { font-size: 28px; color: var(--accent-soft); }
  .sync-status {
    font-size: 12px; padding: 4px 10px; border: 1px solid rgba(196, 165, 116, 0.4);
    border-radius: 2px; color: var(--accent-soft);
    display: flex; align-items: center; gap: 6px;
  }
  .sync-status .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .sync-status.connected { color: #8fbc7a; border-color: rgba(143, 188, 122, 0.5); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .sync-status.connected .dot { animation: pulse 2s infinite; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--line); overflow-x: auto; }
  .tab {
    padding: 14px 22px; background: none; border: none;
    font-family: 'Noto Serif TC', serif; font-size: 15px; color: var(--ink-soft);
    cursor: pointer; position: relative; white-space: nowrap; transition: color 0.2s;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .tab .num { font-family: 'Fraunces', serif; font-style: italic; font-size: 12px; margin-right: 6px; opacity: 0.7; }
  .panel {
    background: var(--bg-card); padding: 32px; border: 1px solid var(--line);
    border-top: none; margin-bottom: 32px; display: none; box-shadow: var(--shadow);
  }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--line-soft); flex-wrap: wrap; gap: 12px;
  }
  .panel-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; }
  .panel-title .en { font-style: italic; color: var(--ink-faded); font-size: 14px; margin-left: 10px; }
  
  /* Form Elements */
  label { display: block; font-size: 12px; letter-spacing: 0.1em; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; font-family: 'Fraunces', serif; font-weight: 500; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); background: white; font-family: 'Noto Serif TC', serif; font-size: 15px; color: var(--ink); border-radius: 2px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; gap: 16px; margin-bottom: 16px; }
  .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .btn { padding: 10px 24px; font-family: 'Noto Serif TC', serif; font-size: 14px; cursor: pointer; border-radius: 2px; transition: all 0.2s; border: 1px solid var(--ink); background: var(--ink); color: var(--bg-card); letter-spacing: 0.05em; }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn-outline { background: transparent; color: var(--ink); }
  .btn-outline:hover { background: var(--ink); color: var(--bg-card); }
  .btn-small { padding: 6px 14px; font-size: 13px; }
  .btn-danger { background: var(--red); border-color: var(--red); }

  /* Bento Grid */
  .bento-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .bento-card { background: white; border: 1px solid var(--line); padding: 16px; transition: all 0.2s; position: relative; }
  .bento-card.confirmed { border-color: var(--live); background: #f4f9f4; }
  .bento-card.confirmed::after { content: "✓ 已上傳"; position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 8px; background: var(--live); color: white; border-radius: 10px; font-family: 'Fraunces', serif; }
  .bento-card .name { font-weight: 500; font-size: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .bento-card .price-tag { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); }
  
  /* Settle Info */
  .settle-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 2px solid var(--ink); }
  .settle-item { background: var(--bg); padding: 12px 14px; border: 1px solid var(--line); border-radius: 2px; display: flex; flex-direction: column; gap: 4px; }
  .settle-item.total { background: var(--ink); color: var(--bg-card); border-color: var(--ink); }
  .settle-item .s-amount { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; }
  .settle-item.total .s-amount { color: var(--accent-soft); }

  /* Toast & Modal */
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--ink); color: var(--bg-card); padding: 12px 20px; border-radius: 2px; font-size: 14px; z-index: 1000; opacity: 0; transform: translateY(10px); transition: all 0.3s; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(26, 26, 26, 0.5); display: none; align-items: center; justify-content: center; z-index: 900; }
  .modal-backdrop.show { display: flex; }
  .modal { background: var(--bg-card); padding: 32px; max-width: 560px; width: 100%; border: 1px solid var(--line); }

  .settings-btn { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--line); width: 36px; height: 36px; cursor: pointer; border-radius: 2px; }

  @media (max-width: 640px) {
    .settle-grid { grid-template-columns: 1fr; }
    .form-row.cols-3, .form-row.cols-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
    <h1><span class="zh">零用金</span></h1>
    <div class="subtitle">— 泥研製所 Shared Ledger —</div>
  </header>

  <div class="balance-bar">
    <div class="item"><span class="label">Total Income</span><span class="value" id="totalIncome">NT$ —</span></div>
    <div class="item"><span class="label">Total Expense</span><span class="value" id="totalExpense">NT$ —</span></div>
    <div class="item"><span class="label">Balance</span><span class="value total" id="totalBalance">NT$ —</span></div>
    <div class="sync-status" id="syncStatus"><span class="dot"></span><span id="syncText">未連線</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-panel="bento"><span class="num">01</span>點餐</button>
    <button class="tab" data-panel="package"><span class="num">02</span>包裹</button>
    <button class="tab" data-panel="sales"><span class="num">03</span>銷售</button>
    <button class="tab" data-panel="extra"><span class="num">04</span>收支</button>
    <button class="tab" data-panel="records"><span class="num">05</span>記錄</button>
  </div>

  <div class="panel active" id="panel-bento">
    <div class="panel-header"><div class="panel-title">點餐 <span class="en">Lunch Order</span></div></div>
    <div class="form-row">
      <div style="display:flex; gap:12px; align-items:center;">
        <label style="margin:0;">日期</label>
        <input type="date" id="bentoDate" style="width:auto;" onchange="loadTodayOrders()">
        <button class="btn btn-outline btn-small" onclick="loadTodayOrders()">↻ 同步最新選擇</button>
      </div>
    </div>
    <div class="bento-grid" id="bentoGrid"></div>
    <div class="settle-grid">
      <div class="settle-item"><span>便當款</span><span class="s-amount" id="settleBento">$0</span></div>
      <div class="settle-item"><span>公司補貼</span><span class="s-amount" id="settleSubsidy">$20/人</span></div>
      <div class="settle-item total"><span>總支出</span><span class="s-amount" id="settleTotal">$0</span></div>
    </div>
    <div class="form-row cols-2" style="margin-top:24px;">
      <div><label>登記人</label><select id="bentoHandler"></select></div>
      <div style="display:flex; align-items:flex-end;"><button class="btn" onclick="submitBento()" style="width:100%;">上傳本日點餐</button></div>
    </div>
  </div>

  <div class="panel" id="panel-records">
      <div class="panel-header"><div class="panel-title">記錄 <span class="en">History</span></div></div>
      <div id="recordsList" style="font-size: 14px;">載入中...</div>
  </div>

</div>

<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <h2>系統設定</h2>
    <label>GAS Web App URL</label>
    <input type="text" id="webhookUrl" placeholder="https://script.google.com/macros/s/...">
    <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-outline" onclick="closeSettings()">取消</button>
        <button class="btn" onclick="saveSettings()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BENTO_PEOPLE = ['淑莉','美菲','佳宜','妍儒','志益','育齊','拍拍','志偉','維妮','其他1','其他2','其他3'];
  const BENTO_MENU = [
    { name: '雞排', price: 100 }, { name: '排骨', price: 100 }, { name: '燒肉', price: 100 },
    { name: '香腸飯', price: 100 }, { name: '烤雞腿', price: 120 }, { name: '炸雞腿', price: 120 },
    { name: '鯖魚排', price: 120 }, { name: '自選/不吃', price: 0 }
  ];

  window.onload = () => {
    initApp();
    renderBentoGrid();
    setupTabs();
    loadTodayOrders();
  };

  function initApp() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('bentoDate').value = today;
    
    // 填入人名下拉
    const handler = document.getElementById('bentoHandler');
    BENTO_PEOPLE.forEach(p => {
        let opt = new Option(p, p);
        handler.add(opt);
    });
    
    if (localStorage.getItem('webhookUrl')) {
        document.getElementById('webhookUrl').value = localStorage.getItem('webhookUrl');
        document.getElementById('syncStatus').classList.add('connected');
        document.getElementById('syncText').textContent = '已連線';
    }
  }

  function setupTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
        });
    });
  }

  function renderBentoGrid() {
    const grid = document.getElementById('bentoGrid');
    grid.innerHTML = BENTO_PEOPLE.map(person => `
      <div class="bento-card" id="card-${person}">
        <div class="name"><span>${person}</span><span class="price-tag" id="price-${person}">$0</span></div>
        <select data-person="${person}" onchange="updateBentoSettle()">
          <option value="自選/不吃">請選擇...</option>
          ${BENTO_MENU.map(m => `<option value="${m.name}" data-price="${m.price}">${m.name} ($${m.price})</option>`).join('')}
        </select>
      </div>
    `).join('');
  }

  function updateBentoSettle() {
    let bentoTotal = 0;
    let count = 0;
    
    BENTO_PEOPLE.forEach(p => {
        const sel = document.querySelector(`select[data-person="${p}"]`);
        const price = parseInt(sel.options[sel.selectedIndex].dataset.price || 0);
        document.getElementById(`price-${p}`).textContent = `$${price}`;
        if (price > 0) {
            bentoTotal += price;
            count++;
        }
    });

    const subsidy = count * 20; // 假設公司補貼每人 20 元
    document.getElementById('settleBento').textContent = `$${bentoTotal}`;
    document.getElementById('settleSubsidy').textContent = `$${subsidy}`;
    document.getElementById('settleTotal').textContent = `$${bentoTotal + subsidy}`;
  }

  async function submitBento() {
    const url = localStorage.getItem('webhookUrl');
    if (!url) return showToast("請先設定 Webhook URL", "error");

    const orders = [];
    BENTO_PEOPLE.forEach(p => {
        const sel = document.querySelector(`select[data-person="${p}"]`);
        if (sel.value !== '自選/不吃') {
            orders.push(`${p}(${sel.value})`);
        }
    });

    if (orders.length === 0) return showToast("目前沒有人點餐", "error");

    const payload = {
        action: 'addRecord',
        date: document.getElementById('bentoDate').value,
        type: 'expense',
        category: '便當',
        amount: document.getElementById('settleTotal').textContent.replace('$', ''),
        reason: "午餐：" + orders.join('、'), // 這裡會寫入詳細人名內容
        handler: document.getElementById('bentoHandler').value
    };

    try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
        showToast("上傳成功！", "success");
        // 標示為已上傳
        BENTO_PEOPLE.forEach(p => {
            const sel = document.querySelector(`select[data-person="${p}"]`);
            if (sel.value !== '自選/不吃') document.getElementById(`card-${p}`).classList.add('confirmed');
        });
    } catch (e) {
        showToast("連線失敗", "error");
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function openSettings() { document.getElementById('settingsModal').classList.add('show'); }
  function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
  function saveSettings() {
    localStorage.setItem('webhookUrl', document.getElementById('webhookUrl').value);
    location.reload();
  }
  
  // 模擬載入今日已點內容 (若 GAS 有支援回傳)
  function loadTodayOrders() {
      console.log("Syncing from Google Sheet...");
      // 這裡可以串接 fetch 獲取當日狀態
  }
</script>
</body>
</html>
